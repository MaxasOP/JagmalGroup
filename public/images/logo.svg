<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40" role="img" aria-label="Jagmal Group logo">
  <!-- Emblem-style logo made from paths so it renders consistently -->
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#c6952d" />
    </linearGradient>
  </defs>
  <!-- Gold circle emblem -->
  <circle cx="20" cy="20" r="16" fill="url(#g)" />

  <!-- Stylized J (path) -->
  <path d="M14 11h6v6a4 4 0 0 1-4 4 4 4 0 0 1-4-4v-2" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Stylized G (path) -->
  <path d="M28 12a8 8 0 1 1-6.9 11.9" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M30 20h-6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" />

  <!-- Wordmark: JAGMAL GROUP as simple geometric wordmark (paths) -->
  <g transform="translate(48,7) scale(1)">
    <text x="0" y="18" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#ffffff">JAGMAL</text>
    <text x="96" y="18" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#d4af37">GROUP</text>
  </g>

</svg>